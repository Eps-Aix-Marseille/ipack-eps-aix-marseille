<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot iPack EPS - Aix-Marseille</title>
    <style>
        :root {
            --am-blue: #002060; /* Bleu institutionnel Aix-Marseille */
            --am-light-blue: #0056b3;
            --bg-gray: #f4f7f9;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-gray); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--am-blue); color: white; padding: 1rem; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.4; }
        .bot { background: white; align-self: flex-start; border-left: 5px solid var(--am-blue); box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        .user { background: var(--am-light-blue); color: white; align-self: flex-end; }

        .suggestions { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px 20px; background: #e9ecef; }
        .chip { background: white; border: 1px solid var(--am-blue); color: var(--am-blue); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .chip:hover { background: var(--am-blue); color: white; }

        .input-area { display: flex; padding: 20px; background: white; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        button { background: var(--am-blue); color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>Assistance iPack EPS - Académie d'Aix-Marseille</h1>
    <p>Votre outil d'aide à la gestion de l'EPS</p>
</header>

<div id="chat-container">
    <div class="message bot">Bonjour collègue. Bienvenue sur l'espace dédié à l'académie d'Aix-Marseille. Comment puis-je vous aider sur iPack EPS aujourd'hui ?</div>
</div>

<div class="suggestions">
    <div class="chip" onclick="ask('Comment valider les projets APPN ?')">Validation APPN</div>
    <div class="chip" onclick="ask('Comment gérer les absences au CCF ?')">Absence CCF</div>
    <div class="chip" onclick="ask('Déclarer les APSA certifiées')">Déclarer APSA</div>
    <div class="chip" onclick="ask('Comment créer un protocole adapté ?')">Protocole Adapté</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Posez votre question ici...">
    <button onclick="handleInput()">Envoyer</button>
</div>

<script>
    // Base de connaissance extraite de vos documents
    const knowledge = {
        "appn": "Pour les projets APPN, vous devez soumettre votre dossier selon la circulaire 2017-04-19 via iPack. L'IPR analyse ensuite les mesures de sécurité avant validation.",
        "absence": "Une absence injustifiée en CCF entraîne la note 'ABS' (zéro). Seuls les élèves avec certificat médical ou cas de force majeure validé par le chef d'établissement peuvent bénéficier d'une épreuve différée.",
        "apsa": "Dans iPack, allez dans l'onglet 'Examens au CCF' pour déclarer les APSA certifiées et déposer vos référentiels sur Tribu.",
        "protocole": "Un protocole adapté doit obligatoirement être validé par la CAHN l'année précédant sa mise en œuvre. Il concerne les inaptitudes partielles permanentes.",
        "default": "Je n'ai pas la réponse précise dans mes documents. Je vous invite à consulter le portail EPS de l'académie d'Aix-Marseille ou à contacter votre coordonnateur."
    };

    function ask(question) {
        document.getElementById('userInput').value = question;
        handleInput();
    }

    function handleInput() {
        const input = document.getElementById('userInput');
        const text = input.value.trim().toLowerCase();
        if (!text) return;

        addMessage(input.value, 'user');
        input.value = '';

        setTimeout(() => {
            let response = knowledge.default;
            if (text.includes('appn')) response = knowledge.appn;
            else if (text.includes('absence') || text.includes('justifiée')) response = knowledge.absence;
            else if (text.includes('apsa')) response = knowledge.apsa;
            else if (text.includes('protocole') || text.includes('adapté')) response = knowledge.protocole;

            addMessage(response, 'bot');
        }, 500);
    }

    function addMessage(text, side) {
        const div = document.createElement('div');
        div.className = `message ${side}`;
        div.innerText = text;
        document.getElementById('chat-container').appendChild(div);
        document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
    }
</script>

</body>
</html>
