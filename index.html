<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant iPack EPS Aix Marseille</title>
    <style>
        :root {
            --am-blue: #002060;
            --am-light-blue: #f0f4f8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--am-light-blue);
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--am-blue);
            color: white;
            padding: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        header img {
            height: 60px;
            width: auto;
            border-radius: 50%;
            border: 2px solid white;
        }

        header div { text-align: left; }
        h1 { margin: 0; font-size: 1.6rem; }
        .subtitle { opacity: 0.8; margin: 0; font-size: 0.9rem; }

        .container {
            max-width: 1000px;
            margin: 0.8rem auto;
            padding: 0.5rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 95%;
        }

        .chat-section {
            flex: 1;
            border: none;
            border-radius: 8px;
            overflow: hidden;
        }

        footer {
            text-align: center;
            padding: 0.6rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <img src="capture_decran_2025-09-08_191648.png" alt="Logo EPS">
        <div>
            <h1>Assistant iPack EPS </h1>
            <p class="subtitle">Académie d'Aix-Marseille</p>
        </div>
    </header>

    <div class="container">
        <div class="chat-section">
            <iframe
                src="https://www.chatbase.co/chatbot-iframe/lkAOJJxel7o6BllVD3_Xo"
                width="100%"
                height="100%"
                frameborder="0"
                allow="microphone"
            ></iframe>
        </div>
    </div>

    <footer>
        &copy; 2026 - Académie d'Aix-Marseille - Assistant Numérique EPS
    </footer>

</body>
</html>
