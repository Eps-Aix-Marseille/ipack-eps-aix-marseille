<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant iPack EPS - Aix-Marseille</title>
    <style>
        :root {
            --am-blue: #002060; --am-light: #0056b3; --am-yellow: #ffcc00;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--am-blue); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--am-yellow); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .bot { background: white; align-self: flex-start; border-left: 5px solid var(--am-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .user { background: var(--am-blue); color: white; align-self: flex-end; }
        .tag { display: block; font-size: 0.7rem; font-weight: bold; margin-top: 5px; text-transform: uppercase; }
        .tag-local { color: var(--am-light); }
        .tag-expert { color: #28a745; }
        .input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { background: var(--am-blue); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        .chips { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #eee; }
        .chip { background: white; border: 1px solid var(--am-blue); padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
    </style>
</head>
<body>

<header>
    <strong>iPack EPS | Académie d'Aix-Marseille</strong>
</header>

<div id="chat-box">
    <div class="msg bot">Bonjour. Je suis votre assistant expert iPack EPS pour Aix-Marseille. Posez-moi votre question sur les examens, les projets APPN ou la gestion de vos classes.</div>
</div>

<div class="chips">
    <div class="chip" onclick="ask('Une absence au CCF ?')">Absence CCF</div>
    <div class="chip" onclick="ask('Validation APPN')">Validation APPN</div>
    <div class="chip" onclick="ask('ASNS / Savoir Nager')">Savoir Nager</div>
    <div class="chip" onclick="ask('Dépôt référentiel')">Dépôt référentiel</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Votre question..." onkeypress="if(event.key=='Enter') handleInput()">
    <button onclick="handleInput()">Envoyer</button>
</div>

<script>
    // 1. BASE DE DONNÉES LOCALE (Vos fichiers)
    const localDocs = [
        { key: ['appn', 'plein air', 'sortie'], resp: "Selon l'IPR d'Aix-Marseille (PPT Mai 2025), les projets APPN doivent être soumis via iPack conformément à la circulaire 2017-04-19. L'IPR analyse la sécurité avant validation." },
        { key: ['absence', 'ccf', 'santorin', 'justifiée'], resp: "FAQ Évaluation : Une absence non justifiée au CCF = note 'ABS' (zéro sur Santorin). Un rattrapage n'est possible qu'avec un certificat médical ou accord du chef d'établissement." },
        { key: ['sss', 'section sportive'], resp: "Le bilan annuel des SSS doit être saisi directement sur iPack pour permettre le suivi académique et le renouvellement." },
        { key: ['protocole', 'cahn', 'adapté'], resp: "Un protocole adapté nécessite l'aval de la CAHN l'année précédente. Il est réservé aux inaptitudes partielles permanentes." }
    ];

    // 2. BASE DE CONNAISSANCE EXPERTE (Apports extérieurs)
    const expertKnowledge = [
        { key: ['nager', 'asns', 'piscine'], resp: "L'Attestation Scolaire de Savoir Nager (ASNS) est obligatoire. Elle doit être validée dans iPack pour figurer sur le livret scolaire de l'élève. En cas de difficulté, vérifiez les créneaux piscines gérés par la collectivité." },
        { key: ['rouler', 'asra', 'vélo'], resp: "Le Savoir Rouler à Vélo (SRAV) est une priorité nationale. iPack permet d'attester les 3 blocs d'apprentissage pour les classes de 6ème." },
        { key: ['tribu', 'partage'], resp: "Tribu est l'espace collaboratif où vous devez déposer vos référentiels d'établissement. Assurez-vous d'avoir les droits via votre adresse académique." },
        { key: ['bac', 'lycée', 'référentiel'], resp: "Pour le Baccalauréat, les référentiels nationaux 2025 s'appliquent. iPack centralise vos choix d'APSA (3 champs d'apprentissage minimum)." }
    ];

    function handleInput() {
        const input = document.getElementById('userInput');
        const text = input.value.trim().toLowerCase();
        if(!text) return;

        addMessage(input.value, 'user');
        input.value = '';

        setTimeout(() => {
            let finalResponse = "";
            let tag = "";

            // Recherche 1 : Vos documents
            let localMatch = localDocs.find(d => d.key.some(k => text.includes(k)));
            
            if(localMatch) {
                finalResponse = localMatch.resp;
                tag = "Source : Dossier Aix-Marseille";
            } 
            // Recherche 2 : Connaissance IA Experte (Apports extérieurs)
            else {
                let expertMatch = expertKnowledge.find(e => e.key.some(k => text.includes(k)));
                if(expertMatch) {
                    finalResponse = expertMatch.resp;
                    tag = "Source : Expertise Pédagogique Nationale";
                } else {
                    // Recherche 3 : Réponse générique intelligente au lieu de "je ne sais pas"
                    finalResponse = "Sur la thématique '" + text + "', je vous conseille de consulter le site <b>EPS Aix-Marseille</b> ou de vérifier les derniers messages sur votre portail <b>ESTEREL</b>. Si cela concerne un paramétrage technique, contactez votre coordonnateur de secteur.";
                    tag = "Conseil d'orientation";
                }
            }
            addMessage(finalResponse, 'bot', tag);
        }, 500);
    }

    function ask(q) { document.getElementById('userInput').value = q; handleInput(); }

    function addMessage(text, side, tag = "") {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerHTML = text + (tag ? `<span class="tag ${side=='bot'?'tag-local':'tag-user'}">${tag}</span>` : "");
        document.getElementById('chat-box').appendChild(div);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }
</script>
</body>
</html>
